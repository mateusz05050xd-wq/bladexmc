<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Dziennik | Portal Ucznia</title>
    <!-- Nowoczesna czcionka i ikony -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* --- ZMIENNE I RESET --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary: #4a6cf7;
            --success: #2ed573;
            --danger: #ff4757;
            --warning: #ffa502;
            --text-main: #2f3542;
            --text-muted: #747d8c;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* --- KONTENER GŁÓWNY --- */
        .dashboard {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInMain 0.8s var(--transition) forwards;
        }

        /* --- NAGŁÓWEK --- */
        header {
            grid-column: span 12;
            background: var(--card-bg);
            padding: 1.5rem 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(74, 108, 247, 0.3);
        }

        /* --- WSPÓLNE STYLE KART --- */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
            border-bottom: 2px solid #f1f2f6;
            padding-bottom: 0.5rem;
        }

        /* --- SIATKA DIZANU (GRID LAYOUT) --- */
        .col-grades { grid-column: span 8; }
        .col-attendance { grid-column: span 4; }
        .col-timetable { grid-column: span 7; }
        .col-notes { grid-column: span 5; }

        @media (max-width: 1024px) {
            .col-grades, .col-attendance, .col-timetable, .col-notes {
                grid-column: span 12;
            }
        }

        /* --- OCENY --- */
        .grades-table {
            width: 100%;
            border-collapse: collapse;
        }

        .grades-table th, .grades-table td {
            padding: 0.75rem 1rem;
            text-align: left;
        }

        .grades-table tr {
            border-bottom: 1px solid #f1f2f6;
            transition: var(--transition);
        }

        .grades-table tbody tr:hover {
            background-color: rgba(7a, 108, 247, 0.04);
        }

        .grade-badge {
            display: inline-block;
            width: 36px;
            height: 36px;
            line-height: 36px;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            margin-right: 0.4rem;
            cursor: pointer;
            transition: var(--transition);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }

        .grade-badge:hover {
            transform: scale(1.15);
        }

        .g-good { background: rgba(46, 213, 115, 0.15); color: var(--success); }
        .g-avg { background: rgba(255, 165, 2, 0.15); color: var(--warning); }
        .g-bad { background: rgba(255, 71, 87, 0.15); color: var(--danger); }

        /* --- OBECNOŚĆ --- */
        .attendance-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .stat-circle {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .attendance-list {
            list-style: none;
        }

        .attendance-item {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px dashed #e4e7eb;
            font-size: 0.9rem;
        }

        .status {
            font-weight: 500;
        }
        .status.present { color: var(--success); }
        .status.absent { color: var(--danger); }

        /* --- PLAN LEKCJI --- */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tab-btn {
            background: #f1f2f6;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary);
            color: white;
        }

        .timetable-row {
            display: grid;
            grid-template-columns: 80px 1fr 120px;
            padding: 0.75rem 0.5rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: var(--transition);
        }

        .timetable-row:hover {
            background: #f8f9fa;
            padding-left: 1rem;
        }

        .time { color: var(--text-muted); font-size: 0.85rem; }
        .subject { font-weight: 500; }
        .room { text-align: right; color: var(--text-muted); font-size: 0.85rem; }

        /* --- UWAGI I POCHWAŁY --- */
        .note-item {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            border-left: 4px solid;
            animation: slideIn 0.6s var(--transition) backwards;
        }

        .note-item.praise {
            background: rgba(46, 213, 115, 0.08);
            border-color: var(--success);
        }

        .note-item.reprimand {
            background: rgba(255, 71, 87, 0.08);
            border-color: var(--danger);
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .note-teacher { font-weight: 600; color: var(--text-main); }

        /* --- ANIMACJE (KEYFRAMES) --- */
        @keyframes fadeInMain {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Opóźnienia dla płynnego efektu ładowania */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <!-- NAGŁÓWEK -->
        <header>
            <div class="user-profile">
                <div class="avatar">JK</div>
                <div>
                    <h2>Jan Kowalski</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Klasa 3A • Profil Matematyczno-Informatyczny</p>
                </div>
            </div>
            <div style="text-align: right;">
                <p id="live-date" style="font-weight: 500;"></p>
                <p style="color: var(--success); font-size: 0.85rem;"><i class="fa-solid fa-circle"></i> Połączono online</p>
            </div>
        </header>

        <!-- KARTA: OCENY -->
        <section class="card col-grades">
            <h3 class="card-title"><i class="fa-solid fa-graduation-cap" style="color: var(--primary);"></i> Ostatnie Oceny</h3>
            <table class="grades-table">
                <thead>
                    <tr>
                        <th>Przedmiot</th>
                        <th>Oceny cząstkowe</th>
                        <th>Średnia</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="subject">Matematyka</td>
                        <td>
