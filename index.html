<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librus Synergia - Panel Nauczyciela Modern</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            
            /* Statusy obecności */
            --ob-color: #10b981;
            --nb-color: #ef4444;
            --sp-color: #f59e0b;
            --u-color: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 24px;
            line-height: 1.5;
        }

        /* Nowoczesny Header */
        header {
            background: var(--bg-card);
            padding: 16px 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .header-title p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: #cbd5e1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #475569;
        }

        /* Główny Układ Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media(min-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: 280px 1fr;
            }
        }

        /* Karty / Panele */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            padding: 24px;
            overflow: hidden;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
        }

        /* Nowoczesny Plan Lekcji */
        .day-bucket {
            margin-bottom: 16px;
        }

        .day-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .lesson-pill {
            font-size: 13px;
            padding: 10px 12px;
            background: #f1f5f9;
            border-radius: 10px;
            margin-bottom: 6px;
            font-weight: 500;
            color: #334155;
            transition: transform 0.2s, background 0.2s;
        }
        .lesson-pill:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(2px);
        }

        /* Elegancka Tabela */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background: var(--bg-card);
        }

        th {
            background: #f8fafc;
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .student-name {
            font-weight: 600;
            color: var(--text-main);
        }

        .student-id {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Stylowe Formularze i Przyciski */
        select, input[type="text"], textarea {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input[type="text"]:focus, textarea:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .action-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        input[type="text"].grade-input {
            width: 60px;
            text-align: center;
            font-weight: 600;
        }

        textarea.remark-textarea {
            width: 100%;
            height: 38px;
            resize: none;
        }

        button.btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        button.btn-add:hover {
            background: #1d4ed8;
        }

        /* Wygląd Ocen i Klasy Statusów */
        .grades-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
            min-height: 28px;
        }

        .grade-pill {
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 700;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        /* Selektor Obecności - Kolorowe Kropki */
        .select-presence-wrapper {
            position: relative;
        }

        .p-select {
            font-weight: 600;
            padding-left: 28px;
            cursor: pointer;
        }

        .presence-indicator {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Kolory wskaźników */
        .ind-ob { background-color: var(--ob-color); }
        .ind-nb { background-color: var(--nb-color); }
        .ind-sp { background-color: var(--sp-color); }
        .ind-u { background-color: var(--u-color); }

        /* Lista uwag */
        .remarks-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 80px;
            overflow-y: auto;
            margin-bottom: 8px;
        }

        .remark-item {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        .remark-item.uwaga {
            background: #fef2f2;
            color: #991b1b;
        }

        .remark-item.pochwala {
            background: #ecfdf5;
            color: #065f46;
        }

        .footer-info {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- GŁÓWNY PANEL GÓRNY -->
    <header>
        <div class="header-logo">
            <div class="logo-icon">L</div>
            <div class="header-title">
                <h1>Librus Synergia</h1>
                <p>Panel Nauczycielski • Klasa 1A (Matematyczno-Fizyczna)</p>
            </div>
        </div>
        <div class="user-profile">
            <div class="text-right" style="text-align: right;">
                <p style="font-weight: 600;">mgr Jan Kowalski</p>
                <p style="font-size: 12px; color: var(--text-muted);">Nauczyciel matematyki</p>
            </div>
            <div class="avatar">JK</div>
        </div>
    </header>

    <!-- UKŁAD STRONY -->
    <div class="dashboard-grid">
        
        <!-- LEWA KOLUMNA: PLAN LEKCJI -->
        <aside class="card">
            <div class="card-title">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Plan Lekcji Tygodnia
            </div>
            <div id="timetable-container"></div>
        </aside>

        <!-- PRAWA KOLUMNA: DZIENNIK KLASY -->
        <main class="card">
            <div class="card-title">
