<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Szkoła3310 PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

#loginBox {
  text-align:center;
  padding:30px;
}

input, select, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button {
  background:#38bdf8;
  cursor:pointer;
  font-weight:bold;
}

#app { display:none; }

/* PANEL */
.container {
  display:flex;
  height:100vh;
}

/* LEFT */
.sidebar {
  width:200px;
  background:#111827;
  padding:10px;
}

/* CENTER */
.main {
  flex:2;
  padding:15px;
  overflow:auto;
}

/* RIGHT */
.right {
  width:300px;
  background:#111827;
  padding:10px;
  overflow:auto;
}

.card {
  background:#1e293b;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔐 Szkoła3310</h2>

  <input id="pass" type="password" placeholder="Hasło">

  <select id="role">
    <option value="teacher">👨‍🏫 Nauczyciel</option>
    <option value="student">👨‍🎓 Uczeń</option>
  </select>

  <button onclick="login()">Wejdź</button>
</div>

<!-- APP -->
<div id="app">

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>📚 Klasy</h3>
    <button onclick="setClass('3a')">3A</button>
    <button onclick="setClass('3b')">3B</button>
    <button onclick="setClass('3c')">3C</button>
    <button onclick="setClass('4a')">4A</button>
    <button onclick="setClass('4b')">4B</button>
    <button onclick="setClass('4c')">4C</button>
    <button onclick="setClass('5a')">5A</button>
    <button onclick="setClass('5b')">5B</button>
    <button onclick="setClass('5c')">5C</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>📊 Oceny / Uwagi</h2>

    <div id="teacherPanel" style="display:none">
      <input id="student" placeholder="Uczeń">

      <input id="grade" placeholder="Ocena (1-6)">
      <button onclick="addGrade()">Dodaj ocenę</button>

      <br>

      <input id="note" placeholder="Uwaga (np. brak pracy domowej)">
      <button onclick="addNote()">Dodaj uwagę</button>
    </div>

    <div id="list"></div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <h2>🏆 Ranking</h2>
    <div id="ranking"></div>
  </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TWOJ_KEY",
  authDomain: "TWOJ_PROJECT.firebaseapp.com",
  projectId: "TWOJ_PROJECT",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const col = collection(db, "grades");

let currentClass = "3a";
let role = "student";
let allData = [];

window.login = function () {
  let pass = document.getElementById("pass").value;
  role = document.getElementById("role").value;

  if (pass === "Szkoła3310") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";

    if (role === "teacher") {
      document.getElementById("teacherPanel").style.display = "block";
    }

  } else {
    alert("Złe hasło");
  }
};

window.setClass = function(c) {
  currentClass = c;
  listen();
};

window.addGrade = async function () {
  let student = document.getElementById("student").value;
  let grade = Number(document.getElementById("grade").value);

  if (!student || !grade) return;

  await addDoc(col, {
    type: "grade",
    student,
    grade,
    class: currentClass,
    date: new Date().toISOString()
  });
};

window.addNote = async function () {
  let student = document.getElementById("student").value;
  let note = document.getElementById("note").value;

  if (!student || !note) return;

  await addDoc(col, {
    type: "note",
    student,
    note,
    class: currentClass,
    date: new Date().toISOString()
  });
};

function listen() {
  const q = query(col, where("class", "==", currentClass));

  onSnapshot(q, (snap) => {
    allData = [];
    snap.forEach(doc => allData.push(doc.data()));
    render();
  });
}

function render() {

  // LISTA
  let html = "";

  allData.forEach(d => {
    if (d.type === "grade") {
      html += `<div class="card">👨‍🎓 ${d.student} — ⭐ ${d.grade}</div>`;
    }

    if (d.type === "note") {
      html += `<div class="card">⚠️ ${d.student}: ${d.note}</div>`;
    }
  });

  document.getElementById("list").innerHTML = html;

  // RANKING (średnie)
  let map = {};

  allData.forEach(d => {
    if (d.type !== "grade") return;

    if (!map[d.student]) map[d.student] = [];
    map[d.student].push(d.grade);
  });

  let ranking = [];

  for (let s in map) {
    let sum = map[s].reduce((a,b)=>a+b,0);
    let avg = sum / map[s].length;
    ranking.push({ name: s, avg: avg.toFixed(2) });
  }

  ranking.sort((a,b)=>b.avg - a.avg);

  let rhtml = "";

  ranking.forEach((r,i) => {
    rhtml += `<div class="card">🏅 ${i+1}. ${r.name}<br>📊 ${r.avg}</div>`;
  });

  document.getElementById("ranking").innerHTML = rhtml;
}

window.onload = () => {
  listen();
};

</script>

</body>
</html>
