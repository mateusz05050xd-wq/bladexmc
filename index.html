<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dziennik Szkolny</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#1565c0;color:#fff;padding:20px;text-align:center}
.container{max-width:1200px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.card,.panel{background:#fff;border-radius:14px;padding:15px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.card{cursor:pointer}
button{background:#1565c0;color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer}
input,textarea,select{width:100%;padding:8px;margin:6px 0}
.grade{display:inline-block;background:#43a047;color:#fff;padding:4px 8px;border-radius:8px;margin:3px}
.note{background:#fff8e1;padding:8px;border-radius:8px;margin:5px 0}
.del{background:#d32f2f;margin-left:6px}
#studentView{display:none}
table{width:100%;border-collapse:collapse;background:#fff}
td,th{border:1px solid #ddd;padding:8px}
</style>
</head>
<body>
<header><h1>Dziennik Szkolny</h1></header>
<div class="container">

<div id="listView">
<h2>Uczniowie</h2>
<div class="grid" id="students"></div>

<h2>Lista obecności klasy</h2>
<div class="panel">
<table id="attendanceTable">
<tr><th>Uczeń</th><th>Obecny</th></tr>
</table>
</div>
</div>

<div id="studentView" class="panel">
<button onclick="back()">← Powrót</button>
<h2 id="studentName"></h2>

<h3>Dodaj ocenę</h3>
<input id="gradeInput" placeholder="np. 5+">
<button onclick="addGrade()">Dodaj</button>

<h3>Oceny</h3>
<div id="grades"></div>

<h3>Dodaj uwagę</h3>
<textarea id="noteInput"></textarea>
<button onclick="addNote()">Dodaj uwagę</button>

<h3>Uwagi</h3>
<div id="notes"></div>
</div>

</div>

<script>
const students=[
"Jan Kowalski","Adam Nowak","Piotr Wiśniewski","Kacper Zieliński",
"Michał Wójcik","Julia Nowicka","Zuzanna Kaczmarek","Oliwia Mazur",
"Maja Zielińska","Natalia Lewandowska","Amelia Dąbrowska","Wiktoria Kamińska"
];

let db=JSON.parse(localStorage.getItem("dziennik"))||{};

students.forEach(s=>{
 if(!db[s]) db[s]={grades:[],notes:[],present:true};
});

function save(){
 localStorage.setItem("dziennik",JSON.stringify(db));
}

const list=document.getElementById("students");
const table=document.getElementById("attendanceTable");

students.forEach(s=>{
 let c=document.createElement("div");
 c.className="card";
 c.innerHTML="<h3>"+s+"</h3><p>Otwórz profil ucznia</p>";
 c.onclick=()=>openStudent(s);
 list.appendChild(c);

 let row=document.createElement("tr");
 row.innerHTML=`<td>${s}</td><td><input type="checkbox" ${db[s].present?"checked":""}></td>`;
 row.querySelector("input").onchange=e=>{
   db[s].present=e.target.checked;
   save();
 };
 table.appendChild(row);
});

let current="";

function openStudent(name){
 current=name;
 document.getElementById("listView").style.display="none";
 document.getElementById("studentView").style.display="block";
 document.getElementById("studentName").innerText=name;
 render();
}

function back(){
 document.getElementById("studentView").style.display="none";
 document.getElementById("listView").style.display="block";
}

function addGrade(){
 let g=document.getElementById("gradeInput").value;
 if(!g)return;
 db[current].grades.push(g);
 save();
 document.getElementById("gradeInput").value="";
 render();
}

function addNote(){
 let n=document.getElementById("noteInput").value;
 if(!n)return;
 db[current].notes.push(n);
 save();
 document.getElementById("noteInput").value="";
 render();
}

function render(){
 let g=document.getElementById("grades");
 g.innerHTML="";
 db[current].grades.forEach((x,i)=>{
   g.innerHTML+=`<div><span class="grade">${x}</span><button class="del" onclick="delGrade(${i})">Usuń</button></div>`;
 });

 let n=document.getElementById("notes");
 n.innerHTML="";
 db[current].notes.forEach((x,i)=>{
   n.innerHTML+=`<div class="note">${x}<br><button class="del" onclick="delNote(${i})">Usuń</button></div>`;
 });
}

function delGrade(i){
 db[current].grades.splice(i,1);
 save();
 render();
}

function delNote(i){
 db[current].notes.splice(i,1);
 save();
 render();
}
</script>
</body>
</html>
